name: Build Mi-FreeForm APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        working-directory: Mi-FreeForm-master    # ← kunci utamanya di sini
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: Mi-FreeForm-master    # ← semua gradle command dari sini
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mi-freeform-debug
          path: Mi-FreeForm-master/app/build/outputs/apk/debug/*.apk
